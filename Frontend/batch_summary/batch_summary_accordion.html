<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Accordion View</title>
    <link rel="stylesheet" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/style.css">
    <style>
        /* Update for header and navigation panel to allow dropdown visibility */
        header {
            background-color: #343a40; /* Dark blue header */
            color: #fff; /* White text */
            padding: 1rem;
            text-align: center;
            position: relative;
            z-index: 1; /* Ensure header is not hidden, but dropdowns show above */
        }
        
        .navigation-panel {
            overflow: visible; /* Ensure that overflow content is visible */
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 1; /* Position this layer below the search box suggestions */
        }
        
        /* SearchBox and autocomplete styles */
        .searchBox {
            display: flex;
            align-items: center;
            position: relative;
            width: 300px;  /* Adjust the width as needed */
            margin-left: auto;
            right: 20px;
            z-index: 999; /* Ensures it's on top of other elements */
        }
        
        .searchBox input {
            padding: 5px;
            font-size: 14px;
            height: 30px; /* Adjust the height */
            width: 100%;
            box-sizing: border-box; /* Ensures the input's width includes padding and borders */
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        /* Dropdown for autocomplete suggestions */
        .autocomplete-suggestions {
            position: absolute;
            top: 35px;  /* Position below the search input field */
            left: 0;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            z-index: 1000; /* Ensure dropdown shows above other elements */
            max-height: 200px;  /* Limit the height */
            overflow-y: auto;   /* Enable vertical scroll if suggestions overflow */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .autocomplete-suggestions div {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            color: black;
        }
        
        .autocomplete-suggestions div:last-child {
            border-bottom: none;
        }
        
        .autocomplete-suggestions div:hover {
            background-color: #f0f0f0;
        }

        .autocomplete-active {
            background-color: #e9e9e9;
            color: black;
        }

        /* Ellipsis Menu */
        .ellipsis-menu {
            position: absolute;
            top: 8px;
            right: 8px;
            cursor: pointer;
            font-size: 35px;
            color: #333;
        }

        .ellipsis-menu:hover {
            box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.2);
            /*background-color: #6f7fe9;*/

        }

        /* Menu Options (Dropdown) */
        .menu-options {
            display: none; /* Hidden by default */
            position: absolute;
            top: 32px;
            right: 2px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .menu-options button {
            width: 100%;
            padding: 8px 12px;
            text-align: left;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
        }

        .menu-options button:hover {
            background-color: #f0f0f0;
        }

        /* Main container to display accordion list and batch details side by side */
        .container {
            display: flex;
            height: 100vh; /* Make it take the full screen height */
        }

        /* Left Sidebar (Batch List) */
        .batch-list {
            width: 300px; /* Fixed width */
            height: 100vh; /* Full viewport height */
            overflow-y: auto; /* Enable scrolling for large batch lists */
            background-color: #f8f8f8;
            padding: 10px;
            border-right: 1px solid #ddd;
            position: absolute; /* Fixes the batch list on the left */
            top: 5;
            left: 0;
        }

        /* Right Content Area (Batch Details) */
        .batch-details {
            flex-grow: 1;
            margin-left: 320px; /* Pushes it to the right of the batch list */
            padding: 20px;
            background-color: #ffffff;
            height: 100vh; /* Ensure it covers full height */
            overflow-y: auto;  /*Enables scrolling for large details */
        }

        /* Batch item styling */
        .batch-item {
            padding: 12px;
            background-color: #ffffff;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: background 0.3s ease;
        }

        .batch-item:hover {
            background-color: #e0e0e0;
        }

        /* Ensures batch details are visible */
        .batch-details.active {
            display: block;
        }

    </style>
</head>
<body>
    <header>
        <h1>List of Batches</h1>
    </header>
    
    <div class="container">
        <div class="batch-list">
            <ul id="batchList"></ul>
        </div>
        <div class="batch-details">
            <h2>Batch Details</h2>
            <div id="batchDetails">Select a batch to view details</div>
        </div>
    </div>
    
    <script>
        async function fetchBatches() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('http://127.0.0.1:8000/test/batches_5/', {
                    method: 'GET',
                    headers: { 'Authorization': `Token ${token}` }
                });
                const responseData = await response.json();
                console.log(responseData)
                const batches = responseData.results;
                console.log(batches)
                const batchList = document.getElementById('batchList');
                
                batches.forEach(batch => {
                    const listItem = document.createElement('li');
                    //listItem.textContent = `<h2>${batch.batch_location}${batch.batch_id.toString().padStart(3, '0')}</h2>`;
                    listItem.classList.add('batch-item');

                    let batchID = `${batch.batch_location}${batch.batch_id.toString().padStart(3, '0')}`;

                    let processList = '';
                    if (Array.isArray(batch.sensor_processes) && batch.sensor_processes.length > 0) {
                        processList = '<ul>';
                            batch.sensor_processes.forEach(process => {
                                processList += `<li>${process.process_id}</li>`
                            });
                            processList += '</ul>';
                    } else {
                        processList = '<p>No processes available</p>';
                    }

                    listItem.innerHTML = `
                        <h2>${batchID}</h2>
                    `;

                    listItem.addEventListener('click', () => showBatchDetails(batch));
                    batchList.appendChild(listItem);
                });
            } catch (error) {
                console.log('Error retrieving batches:', error);
            }
        }
    
        function showBatchDetails(batch) {
            const batchDetailsContainer = document.querySelector('.batch-details');
            const batchDetails = document.getElementById('batchDetails');
    
            // Create table for sensor_processes
            let processContent = '';
            if (Array.isArray(batch.sensor_processes) && batch.sensor_processes.length > 0) {
                const processTable = document.createElement('table');
                processTable.style.width = '100%';
                processTable.style.borderCollapse = 'collapse';
                processTable.style.marginTop = '10px';
    
                const thead = processTable.createTHead();
                const headerRow = thead.insertRow();
                const headerCells = ['Process ID', 'Description', 'Timestamp'];
    
                headerCells.forEach(header => {
                    const th = document.createElement('th');
                    th.style.border = '1px solid #000';
                    th.style.padding = '8px';
                    th.style.backgroundColor = '#f2f2f2';
                    th.textContent = header;
                    headerRow.appendChild(th);
                });
    
                const tbody = processTable.createTBody();
                batch.sensor_processes.forEach(process => {
                    const row = tbody.insertRow();
                    const processIDCell = row.insertCell(0);
                    const descriptionCell = row.insertCell(1);
                    const timeStampCell = row.insertCell(2);
    
                    processIDCell.textContent = process.process_id;
                    descriptionCell.textContent = process.description;
                    timeStampCell.textContent = new Date(process.timestamp).toLocaleString();
    
                    processIDCell.style.border = '1px solid #000';
                    processIDCell.style.padding = '8px';
                    descriptionCell.style.border = '1px solid #000';
                    descriptionCell.style.padding = '8px';
                    timeStampCell.style.border = '1px solid #000';
                    timeStampCell.style.padding = '8px';
                });
    
                processContent = processTable.outerHTML;
            } else {
                processContent = '<p>No process data available.</p>';
            }
    
            // Populate batch details
            batchDetails.innerHTML = `
                <h3>${batch.batch_location}${batch.batch_id.toString().padStart(3, '0')}</h3>
                <p><strong>Process IDs:</strong> ${batch.sensor_processes.map(p => p.process_id).join(', ') || 'N/A'}</p>
                <p><strong>Wafers:</strong> ${batch.total_wafers}</p>
                <p><strong>Sensors per Wafer:</strong> ${batch.total_sensors}</p>
                <p><strong>Batch Label:</strong> ${batch.batch_label || 'N/A'}</p>
                <p><strong>Batch Description:</strong> ${batch.batch_description || 'N/A'}</p>
                <h3>Sensor Processes</h3>
                ${processContent}
            `;
    
            // Ensure the details panel is visible
            batchDetailsContainer.classList.add('active');
        }
    
        fetchBatches();
    </script>
    
</body>
</html>
