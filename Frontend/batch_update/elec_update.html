<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Update</title>
	<link rel="icon" type="image/x-icon" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/icon.png">
	<link rel="stylesheet" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

	<style>
		/* Update for header and navigation panel to allow dropdown visibility */
		header {
		background-color: #343a40; /* Dark blue header */
		color: #fff; /* White text */
		padding: 1rem;
		text-align: center;
		position: relative;
		z-index: 1; /* Ensure header is not hidden, but dropdowns show above */
	}
	
	.navigation-panel {
		overflow: visible; /* Ensure that overflow content is visible */
		display: flex;
		justify-content: space-between;
		position: relative;
		z-index: 1; /* Position this layer below the search box suggestions */
	}
	
	/* SearchBox and autocomplete styles */
	.searchBox {
		display: flex;
		align-items: center;
		position: relative;
		width: 300px;  /* Adjust the width as needed */
		margin-left: auto;
		right: 20px;
		z-index: 999; /* Ensures it's on top of other elements */
	}
	
	.searchBox input {
		padding: 5px;
		font-size: 14px;
		height: 30px; /* Adjust the height */
		width: 100%;
		box-sizing: border-box; /* Ensures the input's width includes padding and borders */
		border: 1px solid #ddd;
		border-radius: 4px;
	}
	
	/* Dropdown for autocomplete suggestions */
	.autocomplete-suggestions {
		position: absolute;
		top: 35px;  /* Position below the search input field */
		left: 0;
		width: 100%;
		border: 1px solid #ddd;
		border-radius: 4px;
		background-color: #fff;
		z-index: 1000; /* Ensure dropdown shows above other elements */
		max-height: 200px;  /* Limit the height */
		overflow-y: auto;   /* Enable vertical scroll if suggestions overflow */
		box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
	}
	
	.autocomplete-suggestions div {
		padding: 10px;
		cursor: pointer;
		border-bottom: 1px solid #eee;
		color: black;
	}
	
	.autocomplete-suggestions div:last-child {
		border-bottom: none;
	}
	
	.autocomplete-suggestions div:hover {
		background-color: #f0f0f0;
	}

	.autocomplete-active {
		background-color: #e9e9e9;
		color: black;
	}

	/* Styling for the larger dropdown */
	#processIdContainer {
		width: 650px;
		border: 1px solid #000;
		padding: 10px;
		margin-left: 20px;
		font-size: 16px;
		height: 100px;
		overflow-y: auto;
		margin-top: 10px;
	}

	.process-item {
		display: flex;
		justify-content: space-between;
		align-items: center;
		margin-bottom: 5px;
		cursor: pointer; /* Make items look clickable */
	}

	.process-item:hover {
		background-color: #add8e6;;
	}

	#selectedProcessBox {
		width: 550px;
		border: 1px solid #000;
		padding: 10px;
		margin-left: 20px;
		font-size: 16px;
		height: 100px;
		overflow-y: auto;
		margin-top: 10px;
	}

	#addedProcessBox {
		width: 600px;
		border: 1px solid #000;
		padding: 10px;
		margin-left: 20px;
		font-size: 16px;
		height: 100px;
		overflow-y: auto;
	}

	.remove-button {
		font-size: 12px; /* Smaller font size */
		padding: 2px 5px; /* Less padding */
		height: auto; /* Adjust height to fit content */
		line-height: 1; /* Adjust line height for compact spacing */
		margin-left: 5%;
	}

	.timestamp-container {
		margin-top: 5px;
	}

	.selected-process {
		display: flex;
		justify-content: space-between;
		align-items: center;
		margin-bottom: 5px;
	}

	.highlighted {
		background-color: #add8e6; /* Light blue color for highlight */
	}

	#overlay > div {
		display: inline-block;
		text-align: center;
		margin-top: 20%;
	}

	.retrieve .input-group {
		display: flex;
		align-items: center;
		gap: 2px; /* spacing between label-input pairs */
		flex-wrap: wrap; /* allows wrapping on small screens */
		}

	.retrieve .input-group label {
		margin-right: 4px;
	}

	.retrieve .input-group input {
		margin-right: 1px;
	}

	</style>
</head>
<body>
    <header>
        <h1>Update Batch</h1>
        <!-- Navigation Panel-->
		<div id="nav-placeholder"></div>
    </header>

	<div id="loader" class="loader"></div>

	<div id="overlay" style="
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: rgba(0, 0, 0, 0.5); 
    z-index: 9999; 
    text-align: center; 
    font-size: 20px; 
    line-height: 100vh; 
    color: white;">
    <div>
        Performing update. Please wait...
        <div id="loader" class="loader"></div> <!-- Use the existing loader CSS -->
    </div>
    </div>

    <div class="retrieve" id="retrieveBatch">
		<div class="input-group">
			<label for="batch_location">Batch Location:</label>
			<input type="text" id="batch_location" required>
			
			<label for="batch_id">Batch ID:</label>
			<input type="text" id="batch_id" required>
		</div>
	 	<br>
		<button id="retrieveButton">Retrieve Data</button>
    </div>
	
	<div class="update" id="electrodeDetails" style="display: none;">
		<h3 style="background-color: #C9CDE4">Sensor Details</h3>
		<p id="batchLocation"></p>
		<p id="batchId"></p>
		<p id="waferIds"></p>
		<p id="sensorIds"></p>
		<p id="wafer_processes"></p>
		<p id="updatedata"></p>
		
<h3 style="background-color: #C9CDE4"> Sensors to Update</h3>
		<form id="updateForm">
			 <label for="wafer_ids">Wafers (Range):</label>
            <input type="text" id="wafer_ids" placeholder="e.g., 1-3, 5, 10">
            
            <label for="sensor_ids">Sensors (Range):</label>
            <input type="text" id="sensor_ids"  placeholder="e.g., 1-5, 8, 10-12">
			<br>

			<h3 style="background-color: #C9CDE4"> Select Fields to Update</h3>			
			<table id="updateTable">
			<br>
				<tr>
					<th style="background-color: #ffffff">Field</th>
					<th style="background-color: #ffffff">Select</th>
					<th style="background-color: #ffffff">New Value</th>
				</tr>
			</table>

			<!-- New fields for process_id and timestamp -->
            <h3 style="background-color: #C9CDE4">Process Details</h3>
            <table id="processTable" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th style="border: 1px solid #000;">Process ID</th>
                        <th style="border: 1px solid #000;">Description</th>
                        <th style="border: 1px solid #000;">Timestamp</th>
                        <th style="border: 1px solid #000;">Remove</th>
                    </tr>
                </thead>
                <tbody id="processTableBody">
                </tbody>
            </table>

            <div style="display: flex;">
                <div id="processIdContainer">
                    <h4>Process ID</h4>
                    <div id="processList"></div>
                </div>

                <div id="selectedProcessBox">
                    <h4>Timestamp</h4>
                    <div id="selectedProcessContainer"></div>
                </div>

            </div>

            <div id="timestampContainerWrapper"></div>

			<h3 style="background-color: #C9CDE4">Processes to be Added</h3>
                <table id="addedProcessTable" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="border: 1px solid #000;">Process ID</th>
                            <th style="border: 1px solid #000;">Description</th>
                            <th style="border: 1px solid #000;">Timestamp</th>
                            <th style="border: 1px solid #000;">Remove</th>
                        </tr>
                    </thead>
                    <tbody id="addedProcessTableBody"></tbody>
                </table>

			<button type="button" id="updateButton">Update</button>
		</form>
</div>

<script type="module" src="./sensor_update.js"></script>
<script type="module" src="../shared/global_tasks.js"></script>

</body>
</html>
