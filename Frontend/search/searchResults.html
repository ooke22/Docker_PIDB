<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Search Results</title>
        <link rel="icon" type="image/x-icon" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/icon.png">
        <link rel="stylesheet" href="../shared/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <style>
        .accordion .accordion-header {
            background-color: #3498db;
            color: white;
            padding: 10px;
            cursor: pointer;
            border: none;
            outline: none;
            transition: background-color 0.3s ease;
            font-size: 16px;
        }

        .accordion .accordion-content {
            display: none;
            padding: 15px;
            background-color: #f7f7f7;
            border-top: 1px solid #ddd;
        }

        .accordion .accordion-content.active {
            display: block;
        }

        .accordion .accordion-header:hover {
            background-color: #2980b9;
        }

        .timeline {
            position: relative;
            margin: 20px 0;
            padding: 0;
        }

        .timeline-item {
            position: relative;
            margin: 20px 0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: #3498db;
        }

        .timeline-content {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            width: 45%;
            margin-left: 60%;
            transform: translateX(-50%);
        }

        .timeline-content h3 {
            text-align: center;
            margin-top: 0;
            font-weight: bold;
        }

        #imageContainer img {
            max-width: 100%;
            margin-top: 10px;
        }

    </style>
    <body>
        <header>
            <h1>Search Results</h1>
            <!-- Navigation Panel-->
            <div id="nav-placeholder"></div>
        </header>

        <div class="searchBox" id="searchBox">
            <input type="text" id="searcH" placeholder="Search..." autofocus>
            <div id="autocomplete-results" class="autocomplete-suggestions"></div>
        </div>
        </div>
        <div id="user-dropdown" class="userDropdown">
        <span class="user-icon"><i class="fa fa-user-circle"></i></span>
        <span id="user-name" class="user-name">Username</span>
        <div class="userDropdown-content" id="userDropdown-content">
            <button id="logoutBtn">Logout</button>
        </div>
        </div>

        <div class="Results"></div>

        <div class="Results accordion"></div>

        <script type="module" src="search_results.js"></script>
    </body>
</html>
