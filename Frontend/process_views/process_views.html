<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>View Processes</title>
	<link rel="icon" type="image/x-icon" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/icon.png">
	<link rel="stylesheet" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

	<style>
		/* Update for header and navigation panel to allow dropdown visibility */
		header {
		background-color: #343a40; /* Dark blue header */
		color: #fff; /* White text */
		padding: 1rem;
		text-align: center;
		position: relative;
		z-index: 1; /* Ensure header is not hidden, but dropdowns show above */
	}
	
	.navigation-panel {
		overflow: visible; /* Ensure that overflow content is visible */
		display: flex;
		justify-content: space-between;
		position: relative;
		z-index: 1; /* Position this layer below the search box suggestions */
	}
	
	/* SearchBox and autocomplete styles */
	.searchBox {
		display: flex;
		align-items: center;
		position: relative;
		width: 300px;  /* Adjust the width as needed */
		margin-left: auto;
		right: 20px;
		z-index: 999; /* Ensures it's on top of other elements */
	}
	
	.searchBox input {
		padding: 5px;
		font-size: 14px;
		height: 30px; /* Adjust the height */
		width: 100%;
		box-sizing: border-box; /* Ensures the input's width includes padding and borders */
		border: 1px solid #ddd;
		border-radius: 4px;
	}
	
	/* Dropdown for autocomplete suggestions */
	.autocomplete-suggestions {
		position: absolute;
		top: 35px;  /* Position below the search input field */
		left: 0;
		width: 100%;
		border: 1px solid #ddd;
		border-radius: 4px;
		background-color: #fff;
		z-index: 1000; /* Ensure dropdown shows above other elements */
		max-height: 200px;  /* Limit the height */
		overflow-y: auto;   /* Enable vertical scroll if suggestions overflow */
		box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
	}
	
	.autocomplete-suggestions div {
		padding: 10px;
		cursor: pointer;
		border-bottom: 1px solid #eee;
		color: black;
	}
	
	.autocomplete-suggestions div:last-child {
		border-bottom: none;
	}
	
	.autocomplete-suggestions div:hover {
		background-color: #f0f0f0;
	}

	.autocomplete-active {
		background-color: #e9e9e9;
		color: black;
	}

	#processTable tr:hover {
		cursor: pointer;
		background-color: #C9CDE4;
	}

     /* Ellipsis Menu */
     .ellipsis-menu {
        position: relative;
        top: 8px;
        right: 8px;
        cursor: pointer;
        font-size: 30px;
        color: #333;
    }

    .ellipsis-menu:hover {
        box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.2);
        /*background-color: #6f7fe9;*/

    }

    /* Menu Options (Dropdown) */
    .menu-options {
        width: 100px;
        display: none; /* Hidden by default */
        position: relative;
        top: 32px;
        right: 2px;
        background-color: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
        z-index: 1000;
    }

    .menu-options button {
        width: 100%;
        padding: 8px 12px;
        text-align: left;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
    }

    .menu-options button:hover {
        background-color: #C9CDE4;
    }

	</style>
</head>
<body>
	<header>
		<h1>Processes</h1>
		<!-- Navigation Panel-->
		<div class="navigation-panel">
			<a href="home_page.html">Home</a>
			<div class="subnav">
				<button class="subnavbtn">Processes <i class="fa fa-caret-down"></i></button>
				<div class="subnav-content">
					<a href="process_encoder.html">Process Encoder</a>
					<a href="process_views.html">Process List</a>
				</div>
			</div>
			<div class="subnav">
				<button class="subnavbtn">Batches <i class="fa fa-caret-down"></i></button>
				<div class="subnav-content">
					<a href="batch_encoder.html">Batch Encoder</a>
					<a href="batch_summary.html">Batch List</a>
				</div>
			</div>
			<div class="subnav">
				<button class="subnavbtn">Images <i class="fa fa-caret-down"></i></button>
				<div class="subnav-content">
					<a href="image_upload.html">Upload Images</a>
					<a href="image_view.html">Sensor Images</a>
				</div>
			</div>
			<a href="elec_update.html">Update Sensors</a>
			<div class="searchBox" id="searchBox">
                <input type="text" id="searcH" placeholder="Search..." autofocus>

		</div>
		<div id="user-dropdown" class="userDropdown">
            <span class="user-icon"><i class="fa fa-user-circle"></i></span>

	<!--div class="search">
		<input type="text" id="searchInput" oninput="filterTable()" onkeyup="handleKeyPress(event)" placeholder="Search...">
		<span class="search-icon"><i class="fa fa-search"></i></span>
	</div-->

	<table border=2 id="processTable">
		<tr>
			<th style="background-color: #C9CDE4;">Process ID</th>
			<th style="background-color: #C9CDE4;">Scope</th>
			<th style="background-color: #C9CDE4;">Description</th>
			<th style="background-color: #C9CDE4;">Source File</th>
			
		</tr>
	</table>

	<script>
        async function fetchData() {
            const token = localStorage.getItem('token');
            const response = await fetch('http://127.0.0.1:8000/process-test/view_processes/', {
                method: 'GET',
                headers: {
                    'Authorization': `Token ${token}`,
                }
            });
            const processData = await response.json();
            console.log(processData)
            createTable(processData);
        }
        
        function createTable(processList) {
            const processTable = document.getElementById('processTable');
            processList.forEach((process, index) => {
                const row = processTable.insertRow(-1);
                row.addEventListener('click', function () {
                    selectedProcess(process)
                });
                row.insertCell(0).textContent = process.process_id;
                row.insertCell(1).textContent = process.scope;
                row.insertCell(2).textContent = process.description;
                row.insertCell(3).textContent = `${process.process_id} File`;
                
                const ellipsisCell = row.insertCell(4);
                ellipsisCell.innerHTML = `
                    <span class="ellipsis-menu" title="Options">⋮</span>
                    <div class="menu-options">
                        <button class="update-btn">Update</button>
                        <button class="delete-btn">Delete</button>
                    </div>`;

                // Event listeners for the ellipsis menu
                const ellipsisMenu = ellipsisCell.querySelector('.ellipsis-menu');
                const menuOptions = ellipsisCell.querySelector('.menu-options');

                ellipsisMenu.addEventListener('click', (event) => {
                    event.stopPropagation();
                    closeAllMenus();
                    menuOptions.style.display = menuOptions.style.display === 'block' ? 'none' : 'block';
                });

                // Event listener for update button
                ellipsisCell.querySelector('.update-btn').addEventListener('click', (event) => {
                    event.stopPropagation();
                    openEditModal(process, row);
                });

                // Eevent listener for delete button
                ellipsisCell.querySelector('.delete-btn').addEventListener('click', (event) => {
                    event.stopPropagation();
                    handleDelete(process.process_id, row);
                });
            });
        }
        
        function selectedProcess(process) {
            localStorage.setItem('selectedProcess', JSON.stringify(process));
            window.location.href = 'file_data.html';
        }

        function closeAllMenus() {
            document.querySelectorAll('.menu-options').forEach(menu => {
                menu.style.display = 'none';
            });
        }

        function openEditModal(process, row) {
            const newProcessID = prompt('Enter new Process ID:', process.process_id) || process.process_id;
            const newScope = prompt('Enter new Scope:', process.scope) || process.scope;
            const newDescription = prompt('Enter new Description:', process.description) || process.description;

            // Validate input lengths 
            if (newProcessID.length > 10) {
                alert('Process ID cannot be longer than 10 characters.');
                return;
            }
            if (newScope.length > 50) {
                alert('Scope cannot be longer than 50 characters.');
                return;
            }
            if (newDescription.length > 200) {
                alert('Description cannot be longer than 200 characters.');
                return;
            }

            if (
                newProcessID === process.process_id &&
                newScope === process.scope &&
                newDescription === process.description
            ) {
                return;
            }
            handleUpdate(process.process_id, newProcessID, newScope, newDescription, row);
        }

        async function handleUpdate(oldProcessID, newProcessID, newScope, newDescription, row) {
            const token = localStorage.getItem('token');
            const response = await fetch(`http://127.0.0.1:8000/process-test/update/${oldProcessID}/`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Token ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    process_id: newProcessID,
                    scope: newScope,
                    description: newDescription
                })
            });

            if (response.ok) {
                alert('Process updated successfully!');
                row.cells[0].textContent = newProcessID;
                row.cells[1].textContent = newScope;
                row.cells[2].textContent = newDescription;
            } else {
                const errorData = await response.json();
                alert(`Failed to update ${errorData.error}`);
            }
        }

        async function handleDelete(processID, row) {
            if (!confirm(`Are you sure you want to delete this process: ${processID}?`)) return;
            const token = localStorage.getItem('token');
            const response = await fetch(`http://127.0.0.1:8000/process-test/delete/${processID}/`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Token ${token}`,
                }
            });

            if (response.ok) {
                alert('Process deleted successfully!');
                row.remove();
            } else {
                alert('Failed to delete process.');
            }
        }

        window.addEventListener('click', closeAllMenus);
        
        window.onload = function() {
            fetchData();
        }
    </script>

</body>
</html>
