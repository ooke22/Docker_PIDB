<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Image Upload</title>
	<link rel="icon" type="image/x-icon" href="https://pidb-bucket.s3.ap-southeast-4.amazonaws.com/frontend/icon.png">
	<link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        /* Update for header and navigation panel to allow dropdown visibility */
		header {
            background-color: #343a40; /* Dark blue header */
            color: #fff; /* White text */
            padding: 1rem;
            text-align: center;
            position: relative;
            z-index: 1; /* Ensure header is not hidden, but dropdowns show above */
        }
        
        .navigation-panel {
            overflow: visible; /* Ensure that overflow content is visible */
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 1; /* Position this layer below the search box suggestions */
        }
        
        /* SearchBox and autocomplete styles */
        .searchBox {
            display: flex;
            align-items: center;
            position: relative;
            width: 300px;  /* Adjust the width as needed */
            margin-left: auto;
            right: 20px;
            z-index: 999; /* Ensures it's on top of other elements */
        }
        
        .searchBox input {
            padding: 5px;
            font-size: 14px;
            height: 30px; /* Adjust the height */
            width: 100%;
            box-sizing: border-box; /* Ensures the input's width includes padding and borders */
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        /* Dropdown for autocomplete suggestions */
        .autocomplete-suggestions {
            position: absolute;
            top: 35px;  /* Position below the search input field */
            left: 0;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            z-index: 1000; /* Ensure dropdown shows above other elements */
            max-height: 200px;  /* Limit the height */
            overflow-y: auto;   /* Enable vertical scroll if suggestions overflow */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .autocomplete-suggestions div {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            color: black;
        }
        
        .autocomplete-suggestions div:last-child {
            border-bottom: none;
        }
        
        .autocomplete-suggestions div:hover {
            background-color: #f0f0f0;
        }
    
        .autocomplete-active {
            background-color: #e9e9e9;
            color: black;
        }

        .info-icon::before {
            content: "\1f6c8";
            font-size: 24px;
            cursor: pointer;
        }

        .drop-area {
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            display: flex; /* Added to make child elements flex items */
            flex-direction: column; /* Align child elements vertically */
            align-items: center; /* Center-align child elements horizontally */
            margin-top: 100px;
        }

        .uploaded-info {
            margin-top: 20px; /* Added margin to separate uploaded info from drop area */
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .thumbnail {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .thumbnailBoxItem {
            position: relative;
        }

        .delete-button {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: transparent;
            border: none;
            color: red;
            font-size: 16px;
            cursor: pointer;
        }

        .info-box {
            width: 30%;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .dropdown-container {
            width: 100%;
            margin-top: 20px;
        }

        .dropdown {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
        }

        #processID {
            width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #processInput {
            width: 290px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .processListDropdown {
            border: 2px solid #ccc;
            max-height: 100px;
            overflow-y: auto;
            position: absolute;
            background: white;
            z-index: 991;
            width: 400px;
        }
        .dropdown-item {
            padding: 8px;
            cursor: pointer;
        }
        .dropdown-item:hover {
            background-color: #f0f0f0;
        }

        .image-upload label {
            font-weight: bold;
        }
        
        
    </style>
</head>
<body>
<header>
    <h1>Sensor Image Upload</h1>
    <!-- Navigation Panel-->
		<div class="navigation-panel">
			<a href="home_page.html">Home</a>
			<div class="subnav">
				<button class="subnavbtn">Processes <i class="fa fa-caret-down"></i></button>
				<div class="subnav-content">
					<a href="process_encoder.html">Process Encoder</a>
					<a href="process_views.html">Process List</a>
				</div>
			</div>
			<div class="subnav">
				<button class="subnavbtn">Batches <i class="fa fa-caret-down"></i></button>
				<div class="subnav-content">
					<a href="batch_encoder.html">Batch Encoder</a>
					<a href="batch_summary_exptable.html">Batch List</a>
				</div>
			</div>
            <div class="subnav">
				<button class="subnavbtn">Images <i class="fa fa-caret-down"></i></button>
				<div class="subnav-content">
					<a href="image_upload.html">Upload Images</a>
					<a href="image_view.html">Sensor Images</a>
				</div>
			</div>
			<div class="subnav">
                <button class="subnavbtn">Updates <i class="fa fa-caret-down"></i></button>
                <div class="subnav-content">
                    <a href="elec_update.html">Update Batch</a>
                    <a href="bulk_sensor_update.html">Update Sensors</a>
                </div>
            </div>
            <div class="searchBox" id="searchBox">
                <input type="text" id="searcH" placeholder="Search..." autofocus>
                <div id="autocomplete-results" class="autocomplete-suggestions"></div>
            </div>
		</div>
        <div id="user-dropdown" class="userDropdown">
            <span class="user-icon"><i class="fa fa-user-circle"></i></span>
			<span id="user-name" class="user-name">Username</span>
            <div class="userDropdown-content" id="userDropdown-content">
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
</header>

<div class="file-format-note">
    <i class="fa fa-info-circle" aria-hidden="true"></i>
    Update multiple sensors within a batch using wafer and sensor ID ranges.
</div>

<div class="image-upload">
    <label for="processID">Process ID:</label>
    <input type="text" id="processInput" placeholder="Enter or select a process">
    <span class="info-icon" title="List of Processes" id="processInfoIcon"></span>
    <div id="processDropdown" class="processListDropdown"></div>
    <br><br>

    <div id="dropArea" class="drop-area">
        <p>Drag and drop your image files here, or <label for="imageFile" id="fileLabel">select image files</label>.</p>
        <input type="file" id="imageFile" accept="image/*" multiple>
        <div class="uploaded-info">
            <div class="info-box" id="thumbnailBox"></div>
            <div class="info-box" id="electrodeBox"></div>
            <div class="info-box" id="processIDBox"></div>
        </div>
    </div>
</div>

<button id="uploadBtn">Upload Image</button>

<!-- Load scripts in dependency order -->
<script type="module" src="../image_upload/domUtils.js"></script>
<script type="module" src="../image_upload/data-fetching.js"></script>
<script type="module" src="../image_upload/fileHandler2.js"></script>
<script type="module" src="../image_upload/uploader.js"></script>
<script type="module" src="../image_upload/index.js"></script>
</body>
</html>
